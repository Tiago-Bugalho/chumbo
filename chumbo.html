<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chumbo</title>
        <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100dvh;

    display:flex;
    flex-direction:column;
    align-items:center;

    color:white;

    background:
    radial-gradient(circle at left top,rgb(255,112,112),transparent 60%),
    radial-gradient(circle at right bottom,rgb(255,112,112),transparent 70%),
    linear-gradient(to right bottom,rgb(0,153,255) 50%);

    padding:40px 20px;

    font-family:Arial,Helvetica,sans-serif;
}

.img{
    margin-bottom:25px;
}

.img img{
    width:180px;
    height:180px;

    object-fit:contain;

    filter:
    drop-shadow(0 10px 30px rgba(0,0,0,.35));

    transition:.3s;
}

.img img:hover{
    transform:scale(1.05);
}

.main{
    width:100%;
    max-width:600px;

    display:flex;
    flex-direction:column;
    gap:18px;

    text-align:center;

    padding:35px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.2);

    border-radius:28px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.25);
}

h1{
    font-size:38px;

    font-weight:900;

    letter-spacing:2px;

    text-shadow:
    0 4px 10px rgba(0,0,0,.3);
}

h2{
    font-size:28px;

    font-weight:600;
}

input{
    width:100%;

    padding:16px;

    border:none;

    border-radius:15px;

    outline:none;

    font-size:18px;

    background:rgba(255,255,255,.9);

    transition:.25s;
}

input:focus{
    transform:translateY(-2px);

    box-shadow:
    0 0 0 4px rgba(255,255,255,.3);
}

input::placeholder{
    color:#666;
}

button{
    padding:18px;

    border:none;

    border-radius:16px;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(135deg,#00a2ff,#006eff);

    transition:.25s;

    box-shadow:
    0 10px 25px rgba(0,0,0,.25);
}

button:hover{
    transform:translateY(-4px);

    box-shadow:
    0 15px 30px rgba(0,0,0,.35);
}

button:active{
    transform:scale(.97);
}

table{
    width:100%;
    max-width:700px;

    margin-top:30px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(15px);

    border-radius:25px;

    overflow:hidden;

    padding:20px;

    color:white;

    box-shadow:
    0 15px 40px rgba(0,0,0,.25);
}

@media(max-width:600px){

    h1{
        font-size:28px;
    }

    h2{
        font-size:22px;
    }

    .main{
        padding:25px;
    }

    .img img{
        width:140px;
        height:140px;
    }
}
</style>
</head>
<body>
    <div class="img">

        <img src="chumbo.png" height="200" alt="">
    </div>
        
    <div class="main">
        <h1>EDUCAÇÃO FINANCEIRA CERTA</h1>
        <h2 id="saldo-inicial">Saldo:</h2>
        <input type="text"  placeholder="Coloque sua descrição...">
        <input type="number" placeholder="Coloque seu valor...">
        <button onclick="add()">Salvar</button>
    </div>
    <table></table>

    <script>
        let saldo = 0;

        const lancamentos = [

    ]

    function render() {
        saldo = 0;
        const table = document.querySelector("table")
        table.innerHTML = ""

        lancamentos.forEach((l) => {
            saldo += l.v
            const tr = document.createElement("tr")
            table.appendChild(tr)
            tr.innerHTML = `
            <td>${l.d}:</td>
            <td>${l.v}</td>
            `
            const sal = document.getElementById("saldo-inicial")
            sal.innerText = `Saldo: ${saldo}`
        })
    }

function add() {
  const d = document.querySelector("input[type=text]").value.trim()

  const v = +document.querySelector("input[type=number]").value

  if (d === "") {
    alert("Digite uma descrição!")
    return 
  }
  if(v === ""){
    alert("Digite um Valor")
    return
  }

  if (!/^[a-zA-ZÀ-ÿ0-9 ]+$/.test(d)) {
    alert("A descrição não pode conter caracteres especiais!")
    return
  }

  lancamentos.push({d, v })
  render()
}

    render()
    </script>
</body>
</html>
